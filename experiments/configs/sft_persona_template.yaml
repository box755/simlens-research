# LLaMA-Factory SFT config template for ONE persona LoRA.
# Spec: SimLens_Research_Plan_v4.1.md §3.3.
#
# Usage: substitute {{PERSONA_ID}} (P1..P8) and run on 5090:
#   sed 's/{{PERSONA_ID}}/P1/g' sft_persona_template.yaml > sft_P1.yaml
#   llamafactory-cli train sft_P1.yaml
#
# Repeat for P1..P8 (8 LoRA adapters).

### model
model_name_or_path: meta-llama/Llama-3.2-3B-Instruct
quantization_bit: 4
quantization_method: gptq

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: q_proj,k_proj,v_proj,o_proj
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

### dataset
dataset: simlens_{{PERSONA_ID}}
dataset_dir: data/distillation/sft
template: llama3
cutoff_len: 4096
max_samples: 100
overwrite_cache: false
preprocessing_num_workers: 8

### output
output_dir: outputs/lora/{{PERSONA_ID}}
logging_steps: 5
save_steps: 50
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
weight_decay: 0.01
bf16: true
flash_attn: fa2  # 5090 supports FA2/FA3

### eval
val_size: 0.1
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 25
